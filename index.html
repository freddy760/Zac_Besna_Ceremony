<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Besna Ceremony — A Beautiful Family Celebration</title>
  <meta name="description" content="A warm family slideshow celebrating the Besna Ceremony." />

  <!-- Elegant ceremonial typography (falls back to system serif if offline) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Marcellus&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ===================== SLIDESHOW STAGE ===================== -->
  <main class="viewport" id="viewport" aria-label="Besna Ceremony slideshow">

    <!-- Decorative gold corner accents (purely decorative) -->
    <svg class="corner corner--tl" viewBox="0 0 120 120" aria-hidden="true">
      <use href="#corner-flourish" />
    </svg>
    <svg class="corner corner--tr" viewBox="0 0 120 120" aria-hidden="true">
      <use href="#corner-flourish" />
    </svg>
    <svg class="corner corner--bl" viewBox="0 0 120 120" aria-hidden="true">
      <use href="#corner-flourish" />
    </svg>
    <svg class="corner corner--br" viewBox="0 0 120 120" aria-hidden="true">
      <use href="#corner-flourish" />
    </svg>

    <!-- Reusable corner flourish definition -->
    <svg width="0" height="0" aria-hidden="true" style="position:absolute">
      <defs>
        <g id="corner-flourish" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
          <path d="M6 6 H54 M6 6 V54" />
          <path d="M14 14 C40 16 56 34 56 64" opacity="0.7" />
          <path d="M14 14 C16 40 34 56 64 56" opacity="0.7" />
          <circle cx="14" cy="14" r="3.2" fill="currentColor" stroke="none" />
          <path d="M58 60 q8 -2 10 -10 q2 8 10 10 q-8 2 -10 10 q-2 -8 -10 -10 Z" fill="currentColor" stroke="none" opacity="0.55" />
        </g>
      </defs>
    </svg>

    <!-- The deck holds every slide. Slides are injected by script.js -->
    <section class="stage">
      <div class="deck" id="deck"></div>
    </section>

    <!-- Caption bar (only shows text on key slides) -->
    <div class="caption" id="caption" aria-live="polite"></div>

    <!-- ===================== CONTROL BAR ===================== -->
    <div class="controls" id="controls">
      <button class="ctrl" id="prevBtn" type="button" aria-label="Previous photo" title="Previous (←)">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 4 L7 12 L15 20" /></svg>
      </button>

      <button class="ctrl ctrl--play" id="playBtn" type="button" aria-label="Pause slideshow" title="Play / Pause (Space)">
        <svg class="icon-pause" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5 V19 M16 5 V19" /></svg>
        <svg class="icon-play"  viewBox="0 0 24 24" aria-hidden="true"><path d="M7 4 L20 12 L7 20 Z" fill="currentColor" stroke="none" /></svg>
      </button>

      <button class="ctrl" id="nextBtn" type="button" aria-label="Next photo" title="Next (→)">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 4 L17 12 L9 20" /></svg>
      </button>

      <span class="divider" aria-hidden="true"></span>

      <!-- Music controls -->
      <button class="ctrl ctrl--music" id="musicBtn" type="button" aria-label="Play soft music" title="Play / pause music">
        <span class="music-label">Play Soft Music</span>
      </button>

      <button class="ctrl" id="muteBtn" type="button" aria-label="Mute music" title="Mute / unmute" hidden>
        <svg class="icon-sound" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 9 H8 L13 5 V19 L8 15 H4 Z" fill="currentColor" stroke="none"/><path d="M16 9 q3 3 0 6 M18.5 7 q5 5 0 10"/></svg>
        <svg class="icon-muted" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 9 H8 L13 5 V19 L8 15 H4 Z" fill="currentColor" stroke="none"/><path d="M16 9 L22 15 M22 9 L16 15"/></svg>
      </button>
    </div>

    <!-- Progress indicator -->
    <div class="progress" id="progress">Photo 1 of 32</div>

  </main>

  <!-- Background music. Replace audio/soft-music.mp3 with your own royalty-free track. -->
  <audio id="bgMusic" loop preload="none">
    <source src="audio/soft-music.mp3" type="audio/mpeg" />
  </audio>

  <script src="script.js"></script>
</body>
</html>
